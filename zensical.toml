[project]
site_name = "JAWS — Java AWS S3"
site_description = "Strongly-typed, proxy-based Java abstraction for Amazon S3"
site_url = "https://tomitribe.github.io/jaws/"
repo_url = "https://github.com/tomitribe/jaws"
repo_name = "tomitribe/jaws"
extra_css = ["stylesheets/extra.css"]
copyright = """
<a href="https://tomitribe.com" class="tomitribe-footer">\
<img src="/jaws/assets/tomitribe.svg" alt="Tomitribe" class="tomitribe-logo">\
</a>\
<span class="tomitribe-copyright">Copyright &copy; 2026 Tomitribe Corporation</span>"""

nav = [
    {"Home" = [
        {"Overview" = "index.md"},
        {"Getting Started" = "getting-started.md"},
    ]},
    {"Guide" = [
        {"Typed Proxies" = "guide/typed-proxies.md"},
        {"Directories & Files" = "guide/directories-and-files.md"},
        {"Annotations" = "guide/annotations.md"},
        {"Walking & Listing" = "guide/walking-and-listing.md"},
        {"Default Methods" = "guide/default-methods.md"},
        {"Filtering" = "guide/filtering.md"},
        {"Uploads & Downloads" = "guide/uploads-and-downloads.md"},
    ]},
    {"Examples" = [
        {"Maven Project" = "examples/maven-project.md"},
        {"Static Website" = "examples/static-website.md"},
        {"Log Archives" = "examples/log-archives.md"},
        {"Data Lake" = "examples/data-lake.md"},
        {"Container Registry" = "examples/container-registry.md"},
    ]},
    {"API Reference" = [
        {"S3Client" = "api/s3client.md"},
        {"S3Bucket" = "api/s3bucket.md"},
        {"S3File" = "api/s3file.md"},
        {"S3 Interfaces" = "api/s3-interfaces.md"},
        {"Annotations" = [
            {"@Name" = "api/annotations/name.md"},
            {"@Parent" = "api/annotations/parent.md"},
            {"@Walk" = "api/annotations/walk.md"},
            {"@Prefix" = "api/annotations/prefix.md"},
            {"@Suffix" = "api/annotations/suffix.md"},
            {"@Match" = "api/annotations/match.md"},
            {"@Filter" = "api/annotations/filter.md"},
            {"@Delimiter" = "api/annotations/delimiter.md"},
            {"@Marker" = "api/annotations/marker.md"},
        ]},
    ]},
]

[project.theme]
logo = "assets/jaws.svg"
font.text = "Inter"
font.code = "JetBrains Mono"
features = [
    "content.code.copy",
    "content.code.annotate",
    "navigation.instant",
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "search.highlight",
    "search.suggest",
    "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/tomitribe/jaws"

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true
