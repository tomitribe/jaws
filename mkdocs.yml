site_name: JAWS — Java AWS S3
site_description: Strongly-typed, proxy-based Java abstraction for Amazon S3
site_url: https://tomitribe.github.io/jaws/
repo_url: https://github.com/tomitribe/jaws
repo_name: tomitribe/jaws

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
      - Typed Proxies: guide/typed-proxies.md
      - Directories & Files: guide/directories-and-files.md
      - Annotations: guide/annotations.md
      - Walking & Listing: guide/walking-and-listing.md
      - Filtering: guide/filtering.md
      - Uploads & Downloads: guide/uploads-and-downloads.md
  - API Reference:
      - S3Client: api/s3client.md
      - S3Bucket: api/s3bucket.md
      - S3File: api/s3file.md
      - S3 Interfaces: api/s3-interfaces.md
      - Annotations:
          - "@Name": api/annotations/name.md
          - "@Parent": api/annotations/parent.md
          - "@Walk": api/annotations/walk.md
          - "@Prefix": api/annotations/prefix.md
          - "@Filter": api/annotations/filter.md
          - "@Delimiter": api/annotations/delimiter.md
          - "@Marker": api/annotations/marker.md
